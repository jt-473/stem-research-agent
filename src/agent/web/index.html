<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STEM Research Agent</title>
<style>
  :root {
    --bg: #0f1220; --panel: #191d33; --text: #e8eaf6; --muted: #9aa0c3;
    --accent: #6c8cff; --border: #2a2f4d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    line-height: 1.55;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 1.6rem; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 28px; }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 20px;
  }
  label { display: block; font-size: .85rem; color: var(--muted); margin: 14px 0 4px; }
  input[type=text], select {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 1rem;
  }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 180px; }
  .check { display: flex; align-items: center; gap: 8px; margin-top: 26px; }
  button {
    margin-top: 20px; padding: 11px 22px; font-size: 1rem; border: 0;
    border-radius: 8px; background: var(--accent); color: #fff; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: wait; }
  .notice {
    background: #3a2f18; border: 1px solid #6b5b2e; color: #ffdf9e;
    padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: .9rem;
  }
  .error { background: #3a1a22; border-color: #6b2e3c; color: #ff9eb0; }
  .src { border-top: 1px solid var(--border); padding: 14px 0; }
  .src:first-child { border-top: 0; }
  .src h3 { margin: 0 0 6px; font-size: 1rem; }
  .ref { font-size: .9rem; color: var(--muted); }
  .intext {
    display: inline-block; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 1px 8px; font-size: .85rem; margin-top: 6px;
  }
  blockquote {
    margin: 10px 0; padding: 10px 14px; border-left: 3px solid var(--accent);
    background: var(--bg); border-radius: 0 8px 8px 0; font-size: .95rem;
  }
  .quote-meta { color: var(--muted); font-size: .85rem; }
  img.figure { max-width: 100%; border-radius: 8px; margin-top: 10px; }
  a { color: var(--accent); }
  .hidden { display: none; }
  .spinner { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>STEM Research Agent</h1>
  <p class="sub">Find real papers, cite them in your style, and pull quotes for your report.</p>

  <div id="keyNotice" class="notice hidden"></div>

  <div class="card">
    <label for="q">What do you want to research?</label>
    <input type="text" id="q" placeholder="e.g. does caffeine improve reaction time"
           autofocus>
    <div class="row">
      <div>
        <label for="style">Citation style</label>
        <select id="style"></select>
      </div>
      <div>
        <label for="limit">Papers per source</label>
        <select id="limit">
          <option>3</option><option selected>5</option><option>8</option><option>10</option>
        </select>
      </div>
      <div class="check">
        <input type="checkbox" id="quotes" checked>
        <label for="quotes" style="margin:0">Pull quotable passages</label>
      </div>
    </div>
    <button id="go">Research</button>
    <span id="status" class="spinner"></span>
  </div>

  <div id="results"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let hasKey = false;

async function loadMeta() {
  try {
    const meta = await (await fetch("/api/meta")).json();
    const sel = $("style");
    for (const [key, desc] of Object.entries(meta.styles)) {
      const opt = document.createElement("option");
      opt.value = key;
      opt.textContent = desc;
      if (key === meta.default_style) opt.selected = true;
      sel.appendChild(opt);
    }
    hasKey = meta.has_api_key;
    if (!hasKey) {
      const n = $("keyNotice");
      n.classList.remove("hidden");
      n.textContent = "No API key set yet, so you'll get paper search and " +
        "citations only. Add your Anthropic key to the .env file to unlock " +
        "AI summaries and quotes, then restart this page.";
      $("quotes").checked = false;
      $("quotes").disabled = true;
    }
  } catch { /* meta is a nicety; the form still works */ }
}

function el(tag, cls, text) {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  if (text) node.textContent = text;
  return node;
}

function render(data) {
  const box = $("results");
  box.replaceChildren();

  if (data.error) {
    const n = el("div", "notice error", data.error);
    box.appendChild(n);
    return;
  }
  if (data.notice) box.appendChild(el("div", "notice", data.notice));

  if (data.synthesis) {
    const card = el("div", "card");
    card.appendChild(el("h2", null, "Answer"));
    card.appendChild(el("p", null, data.synthesis));
    (data.figures || []).forEach((src) => {
      const img = el("img", "figure");
      img.src = src;
      card.appendChild(img);
    });
    if (data.report) {
      const p = el("p", "quote-meta", "Full report saved to: " + data.report);
      card.appendChild(p);
    }
    box.appendChild(card);
  }

  if (data.quotes && data.quotes.length) {
    const card = el("div", "card");
    card.appendChild(el("h2", null, "Quotes you can paste"));
    data.quotes.forEach((group) => {
      card.appendChild(el("h3", null, group.paper));
      group.items.forEach((q) => {
        const bq = el("blockquote");
        bq.appendChild(el("div", null, '"' + q.quote + '" ' + q.in_text));
        if (q.supports) bq.appendChild(el("div", "quote-meta", "supports: " + q.supports));
        card.appendChild(bq);
      });
    });
    box.appendChild(card);
  }

  if (data.sources && data.sources.length) {
    const card = el("div", "card");
    card.appendChild(el("h2", null, "Sources and citations"));
    data.sources.forEach((s) => {
      const div = el("div", "src");
      div.appendChild(el("h3", null, s.title + (s.year ? " (" + s.year + ")" : "")));
      if (s.main_finding) div.appendChild(el("div", null, s.main_finding));
      div.appendChild(el("div", "ref", s.reference));
      div.appendChild(el("span", "intext", "in-text: " + s.in_text));
      if (s.url) {
        const a = el("a", null, "open paper");
        a.href = s.url; a.target = "_blank"; a.style.marginLeft = "10px";
        div.appendChild(a);
      }
      card.appendChild(div);
    });
    box.appendChild(card);
  } else if (!data.synthesis) {
    box.appendChild(el("div", "notice", "No papers found. Try a broader topic."));
  }
}

async function go() {
  const question = $("q").value.trim();
  if (!question) { $("q").focus(); return; }
  $("go").disabled = true;
  $("status").textContent = hasKey
    ? "Working on it. This can take a minute or two..."
    : "Searching...";
  try {
    const resp = await fetch("/api/research", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        question,
        style: $("style").value,
        quotes: $("quotes").checked,
        limit: parseInt($("limit").value, 10),
      }),
    });
    render(await resp.json());
  } catch (e) {
    render({ error: "Could not reach the server: " + e.message });
  } finally {
    $("go").disabled = false;
    $("status").textContent = "";
  }
}

$("go").addEventListener("click", go);
$("q").addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
loadMeta();
</script>
</body>
</html>
